name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build:pages -w client

      - name: Copy build to repository root (legacy Pages)
        run: |
          rm -rf assets
          cp client/dist/index.html index.html
          cp -r client/dist/assets assets
          cp client/dist/manifest.webmanifest manifest.webmanifest
          cp client/dist/shield.svg shield.svg
          touch .nojekyll

      - name: Commit and push game files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets manifest.webmanifest shield.svg .nojekyll
          git diff --staged --quiet || git commit -m "Deploy game to GitHub Pages [skip ci]"
          git push
